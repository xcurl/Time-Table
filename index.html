<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timetable">
<title>Timetable</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  font-family: 'Nunito', -apple-system, sans-serif;
  min-height: 100dvh;
  padding: env(safe-area-inset-top, 52px) 18px env(safe-area-inset-bottom, 30px);
  overflow-x: hidden;
  background: #000000;
  transition: background 0.3s;
}

@media all and (display-mode: standalone) {
  body { background: #000000 !important; }
}

/* ── LIGHT ── */
body.light {
  --txt:         #1a1008;
  --txt-soft:    rgba(30,20,10,0.45);
  --txt-accent:  #8a5200;
  --glass-bg:    rgba(255,255,255,0.55);
  --glass-bdr:   rgba(0,0,0,0.12);
  --shine:       rgba(255,255,255,0.8);
  --row-bg:      rgba(0,0,0,0.04);
  --row-bdr:     rgba(0,0,0,0.09);
  --active-bg:   rgba(0,0,0,0.09);
  --active-bdr:  rgba(0,0,0,0.22);
  --pill-bg:     rgba(0,0,0,0.08);
  --pill-bdr:    rgba(0,0,0,0.15);
  --dot:         #b07000;
  --bar:         linear-gradient(to bottom,#c08000,#e0a000);
  --tea-bg:      rgba(200,120,0,0.08);
  --tea-bdr:     rgba(200,120,0,0.2);
  --tea-txt:     #a06000;
  --lun-bg:      rgba(180,40,80,0.07);
  --lun-bdr:     rgba(180,40,80,0.18);
  --lun-txt:     #aa3060;
  --free-bg:     rgba(20,140,70,0.07);
  --free-bdr:    rgba(20,140,70,0.16);
  --free-txt:    #1a7a40;
  --bg-fallback: #f2ede8;
}

body.light { background: #f2ede8; }

/* ── DARK (Pure Black + Ultra Glass) ── */
body.dark {
  --txt:         rgba(255,255,255,0.95);
  --txt-soft:    rgba(255,255,255,0.42);
  --txt-accent:  rgba(255,210,130,0.9);
  --glass-bg:    rgba(255,255,255,0.05);
  --glass-bdr:   rgba(255,255,255,0.10);
  --shine:       rgba(255,255,255,0.10);
  --row-bg:      rgba(255,255,255,0.04);
  --row-bdr:     rgba(255,255,255,0.08);
  --active-bg:   rgba(255,255,255,0.10);
  --active-bdr:  rgba(255,255,255,0.26);
  --pill-bg:     rgba(255,255,255,0.08);
  --pill-bdr:    rgba(255,255,255,0.14);
  --dot:         rgba(255,200,80,1);
  --bar:         linear-gradient(to bottom,rgba(255,210,100,1),rgba(255,140,50,.8));
  --tea-bg:      rgba(255,160,20,0.07);
  --tea-bdr:     rgba(255,160,20,0.16);
  --tea-txt:     #ffc840;
  --lun-bg:      rgba(220,60,100,0.07);
  --lun-bdr:     rgba(220,60,100,0.16);
  --lun-txt:     #ff90b0;
  --free-bg:     rgba(40,180,100,0.06);
  --free-bdr:    rgba(40,180,100,0.14);
  --free-txt:    #60d890;
  --bg-fallback: #000000;
  background: #000000;
}

@media all and (display-mode: standalone) {
  body.dark { background: #000000 !important; }
}

/* ── Layout ── */
.wrap { display: flex; flex-direction: column; gap: 14px; }

/* ── Glass effect — ultra transparent on black ── */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(32px) saturate(1.8) brightness(1.1);
  -webkit-backdrop-filter: blur(32px) saturate(1.8) brightness(1.1);
  border: 1px solid var(--glass-bdr);
  border-radius: 22px;
  box-shadow:
    0 4px 32px rgba(0,0,0,0.5),
    0 1px 0 rgba(255,255,255,0.06) inset,
    0 0 0 0.5px rgba(255,255,255,0.04) inset;
  transition: background 0.3s, border-color 0.3s;
}

/* Subtle top highlight streak */
.glass::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 22px;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%);
  pointer-events: none;
}

/* ── Header ── */
.header { display:flex; justify-content:space-between; align-items:center; padding:0 2px; animation:rise .4s ease both; }
.header h1 { font-size:26px; font-weight:900; letter-spacing:-.5px; color:var(--txt); }
.header h1 em { font-style:normal; color:var(--tea-txt); }
.header p { font-size:11px; font-weight:600; color:var(--txt-soft); margin-top:1px; }
.header-right { display:flex; align-items:center; gap:8px; }

.day-pill, .theme-btn {
  background: var(--pill-bg);
  backdrop-filter: blur(20px) saturate(1.8);
  -webkit-backdrop-filter: blur(20px) saturate(1.8);
  border: 1px solid var(--pill-bdr);
  border-radius: 50px;
  color: var(--txt);
  font-family: 'Nunito', -apple-system, sans-serif;
  font-weight: 800;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: inset 0 1px 0 var(--shine), 0 2px 12px rgba(0,0,0,0.3);
  transition: all .3s;
}
.day-pill { padding:5px 13px; font-size:12px; letter-spacing:.4px; text-transform:uppercase; }
.theme-btn { width:34px; height:34px; font-size:15px; display:flex; align-items:center; justify-content:center; border-radius:50%; border-color:var(--glass-bdr); }
.theme-btn:active { transform:scale(.9); }

/* ── Period cards ── */
.period-row { display:grid; grid-template-columns:1fr 1fr; gap:11px; }

.pcard { padding:15px 14px; position:relative; overflow:hidden; animation:rise .4s ease both; }
.pcard::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent); }

.pb-lbl { font-size:9px; font-weight:800; letter-spacing:1.3px; text-transform:uppercase; color:var(--txt-soft); display:flex; align-items:center; gap:4px; margin-bottom:7px; }
.dot { width:5px; height:5px; border-radius:50%; background:var(--dot); animation:pulse 2s infinite; box-shadow:0 0 8px var(--dot), 0 0 16px rgba(255,200,80,0.4); }
.pb-name { font-size:19px; font-weight:900; letter-spacing:-.4px; line-height:1.1; color:var(--txt); }
.pb-name.tea  { color:var(--tea-txt); }
.pb-name.lun  { color:var(--lun-txt); }
.pb-name.free { color:var(--free-txt); }
.pb-name.dim  { color:var(--txt-soft); font-size:16px; }
.pb-room { font-size:10px; font-weight:700; margin-top:4px; color:var(--txt-accent); }
.pb-time { font-size:9px; font-weight:600; color:var(--txt-soft); margin-top:2px; }

/* ── Schedule ── */
.scard { padding:16px 15px; animation:rise .4s .08s ease both; position:relative; overflow:hidden; }
.scard-lbl { font-size:10px; font-weight:800; letter-spacing:1.3px; text-transform:uppercase; color:var(--txt-soft); margin-bottom:11px; }
.slist { display:flex; flex-direction:column; gap:7px; }

.srow {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:14px;
  border:1px solid var(--row-bdr); background:var(--row-bg);
  position:relative; overflow:hidden; transition:all .2s;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.srow::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent); }
.srow.active  { background:var(--active-bg); border-color:var(--active-bdr); box-shadow: 0 0 20px rgba(255,255,255,0.04); }
.srow.active::after { content:''; position:absolute; left:0; top:18%; bottom:18%; width:3px; border-radius:3px; background:var(--bar); box-shadow: 0 0 8px rgba(255,200,80,0.6); }
.srow.tea  { background:var(--tea-bg);  border-color:var(--tea-bdr); }
.srow.lun  { background:var(--lun-bg);  border-color:var(--lun-bdr); }
.srow.free { background:var(--free-bg); border-color:var(--free-bdr); opacity:.75; }

.s-idx  { font-size:9px; font-weight:700; color:var(--txt-soft); min-width:12px; text-align:center; }
.s-info { flex:1; display:flex; flex-direction:column; gap:1px; overflow:hidden; }
.s-name { font-size:14px; font-weight:800; color:var(--txt); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.s-name.tea  { color:var(--tea-txt); }
.s-name.lun  { color:var(--lun-txt); }
.s-name.free { color:var(--free-txt); }
.s-room { font-size:9px; font-weight:700; color:var(--txt-accent); }
.s-time { font-size:9px; font-weight:600; color:var(--txt-soft); text-align:right; white-space:nowrap; flex-shrink:0; }
.badge {
  font-size:8px; font-weight:800;
  background: rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  color:var(--txt-soft); border-radius:6px; padding:2px 6px; white-space:nowrap;
}

.refresh-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  color:var(--txt-soft); font-family:'Nunito',-apple-system,sans-serif;
  font-size:13px; font-weight:700; padding:12px; cursor:pointer; width:100%; text-align:center;
  -webkit-tap-highlight-color:transparent; transition:all .15s;
  animation:rise .4s .15s ease both;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
}
.refresh-btn:active { background: rgba(255,255,255,0.10); color:var(--txt); transform:scale(.98); }

@keyframes rise  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.25;transform:scale(.6)} }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <h1>CSE <em>VI‑B</em></h1>
      <p id="dt">—</p>
    </div>
    <div class="header-right">
      <div class="day-pill" id="db">—</div>
      <button class="theme-btn" id="tbtn" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div class="period-row">
    <div class="pcard glass" style="animation-delay:.04s">
      <div class="pb-lbl"><span class="dot"></span>Now</div>
      <div class="pb-name" id="cn">—</div>
      <div class="pb-room" id="cr"></div>
      <div class="pb-time" id="ct"></div>
    </div>
    <div class="pcard glass" style="animation-delay:.07s">
      <div class="pb-lbl">↪ Next</div>
      <div class="pb-name dim" id="nn">—</div>
      <div class="pb-room" id="nr"></div>
      <div class="pb-time" id="nt"></div>
    </div>
  </div>

  <div class="scard glass">
    <div class="scard-lbl">Today's Schedule</div>
    <div class="slist" id="sl"></div>
  </div>

  <button class="refresh-btn" onclick="init()">↻ Refresh</button>
</div>

<script>
// ── Theme ─────────────────────────────────────────────────
var manualMode = null;

function getAutoTheme() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme(m) {
  document.body.classList.toggle('dark',  m === 'dark');
  document.body.classList.toggle('light', m === 'light');
  document.getElementById('tbtn').textContent = m === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  var cur = document.body.classList.contains('dark') ? 'dark' : 'light';
  manualMode = cur === 'dark' ? 'light' : 'dark';
  applyTheme(manualMode);
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
  if (!manualMode) applyTheme(e.matches ? 'dark' : 'light');
});

// ── Data ──────────────────────────────────────────────────
var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var SLOTS = [
  {l:'08:30–09:25', s:510, e:565},
  {l:'09:25–10:20', s:565, e:620},
  {l:'10:20–10:40', s:620, e:640},
  {l:'10:40–11:35', s:640, e:695},
  {l:'11:35–12:30', s:695, e:750},
  {l:'12:30–01:30', s:750, e:810},
  {l:'01:30–02:25', s:810, e:865},
  {l:'02:25–03:20', s:865, e:920},
  {l:'03:20–04:15', s:920, e:975}
];
var TT = {
  1:[{n:'CNSL Lab'},{n:'CNSL Lab'},{n:'Tea Break'},{n:'PE-4',r:'Room 201'},{n:'ASDD'},{n:'Lunch Break'},{n:'CNS'},{n:'CC'},{n:'Free Hour'}],
  2:[{n:'CNS'},{n:'CC'},{n:'Tea Break'},{n:'OE-2'},{n:'PE-5',r:'Room 112'},{n:'Lunch Break'},{n:'WT'},{n:'CCL Lab'},{n:'Free Hour'}],
  3:[{n:'CC'},{n:'ASDD'},{n:'Tea Break'},{n:'PE-5',r:'Room 114'},{n:'PE-4',r:'Room 114'},{n:'Lunch Break'},{n:'WT'},{n:'Free Hour'},{n:'Free Hour'}],
  4:[{n:'WT'},{n:'CNS'},{n:'Tea Break'},{n:'OE-2'},{n:'OE-2'},{n:'Lunch Break'},{n:'PE-5',r:'Room 113'},{n:'Adv Placement'},{n:'Adv Placement'}],
  5:[{n:'WTL Lab'},{n:'WTL Lab'},{n:'Tea Break'},{n:'Adv Placement'},{n:'Adv Placement'},{n:'Lunch Break'},{n:'PE-4',r:'Room 101'},{n:'ASDD'},{n:'Free Hour'}],
  6:[{n:'Seminar/Club'},{n:'Seminar/Club'},{n:'Tea Break'},{n:'Seminar/Club'},{n:'Seminar/Club'},{n:'Lunch Break'},{n:'Seminar/Club'},{n:'Seminar/Club'},{n:'Seminar/Club'}]
};

function nm() { var d=new Date(); return d.getHours()*60+d.getMinutes(); }
function slotAt(m) { for(var i=0;i<SLOTS.length;i++) if(m>=SLOTS[i].s&&m<SLOTS[i].e) return i; return -1; }
function typeOf(e) { if(!e) return 's'; if(e.n==='Tea Break') return 'tea'; if(e.n==='Lunch Break') return 'lun'; if(e.n==='Free Hour') return 'free'; return 's'; }
function nc(e,dim) { var t=typeOf(e); if(t==='tea') return 'tea'; if(t==='lun') return 'lun'; if(t==='free') return 'free'; return dim?'dim':''; }

function init() {
  var now=new Date(), day=now.getDay(), mins=nm();
  var row = TT[day] || [];
  var si  = slotAt(mins);

  document.getElementById('db').textContent = DAYS[day];
  document.getElementById('dt').textContent =
    now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) + ' · SVB‑214';

  var cn=document.getElementById('cn'), cr=document.getElementById('cr'), ct=document.getElementById('ct');
  var nn=document.getElementById('nn'), nr=document.getElementById('nr'), nt=document.getElementById('nt');
  cn.className='pb-name'; nn.className='pb-name dim';

  if (day===0) {
    cn.textContent='Sunday 🌿'; cr.textContent=''; ct.textContent='No classes today';
  } else if (si===-1 && mins<510) {
    cn.textContent='Before Hours'; cr.textContent=''; ct.textContent='College starts 08:30';
  } else if (si===-1 && mins>=975) {
    cn.textContent='All Done!'; cr.textContent=''; ct.textContent='See you tomorrow';
    cn.className='pb-name free';
  } else if (si>=0 && row[si]) {
    var e=row[si];
    cn.textContent=e.n; cr.textContent=e.r||''; ct.textContent=SLOTS[si].l;
    cn.className='pb-name '+nc(e,false);
  }

  var ni=-1, s0=(si===-1&&mins<510)?0:(si>=0?si+1:-1);
  if (s0>=0) for(var i=s0;i<SLOTS.length;i++) if(row[i]){ni=i;break;}
  if (ni>=0) {
    var ne=row[ni];
    nn.textContent=ne.n; nr.textContent=ne.r||''; nt.textContent=SLOTS[ni].l;
    nn.className='pb-name '+nc(ne,true);
  } else {
    nn.textContent='No more'; nr.textContent=''; nt.textContent="That's all!";
  }

  var sl=document.getElementById('sl'); sl.innerHTML='';
  if (day===0) {
    sl.innerHTML='<div style="color:var(--txt-soft);font-size:13px;padding:6px 0">No classes on Sunday 🎉</div>';
    return;
  }
  var groups=[], idx=0;
  while (idx<SLOTS.length) {
    var e=row[idx]; if(!e){idx++;continue;}
    var j=idx+1;
    while(j<SLOTS.length&&row[j]&&row[j].n===e.n&&(row[j].r||'')===(e.r||'')) j++;
    groups.push({e:e,from:idx,to:j-1,count:j-idx}); idx=j;
  }
  var pNum=1;
  groups.forEach(function(g) {
    var tc=typeOf(g.e), isAct=(si>=g.from&&si<=g.to);
    var pidx=(tc==='tea'||tc==='lun')?'·':String(pNum);
    if(tc==='s'||tc==='free') pNum++;
    var div=document.createElement('div');
    div.className='srow '+tc+(isAct?' active':'');
    var tStart=SLOTS[g.from].l.split('–')[0].trim();
    var tLabel=g.count>1?(tStart+'–'+SLOTS[g.to].l.split('–')[1].trim()):SLOTS[g.from].l;
    div.innerHTML=
      '<span class="s-idx">'+pidx+'</span>'+
      '<span class="s-info">'+
        '<span class="s-name '+tc+'">'+g.e.n+(g.count>1?' <span class="badge">'+g.count+' hrs</span>':'')+'</span>'+
        (g.e.r?'<span class="s-room">'+g.e.r+'</span>':'')+
      '</span>'+
      '<span class="s-time">'+tStart+'</span>';
    sl.appendChild(div);
  });
}

// ── Boot ──────────────────────────────────────────────────
applyTheme('dark'); // Always start in dark mode

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
setInterval(init, 30000);
</script>
</body>
</html>
